services:
  db:
    image: postgis/postgis:16-3.4
    container_name: abasto-paceno-db
    environment:
      POSTGRES_DB: abasto_paceno
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d abasto_paceno"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: abasto-paceno-backend
    working_dir: /workspace
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: abasto_paceno
      JWT_SECRET: change_me
      JWT_EXPIRES_IN: 1d
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - workspace_node_modules:/workspace/node_modules
      - backend_node_modules:/workspace/apps/backend/node_modules
    command: >
      sh -c "if [ -f apps/backend/package.json ]; then
        yarn workspace backend start:dev;
      else
        echo 'Pending backend scaffold. Expected command: yarn workspace backend start:dev' &&
        tail -f /dev/null;
      fi"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: abasto-paceno-web
    working_dir: /workspace
    depends_on:
      backend:
        condition: service_started
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
      - workspace_node_modules:/workspace/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
    command: >
      sh -c "if [ -f apps/web/package.json ]; then
        yarn workspace web dev --host 0.0.0.0;
      else
        echo 'Pending web scaffold. Expected command: yarn workspace web dev --host 0.0.0.0' &&
        tail -f /dev/null;
      fi"

volumes:
  postgres_data:
  workspace_node_modules:
  backend_node_modules:
  web_node_modules:

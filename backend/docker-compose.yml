version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: abasto_paceno_postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: abasto_paceno
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
